name: Tests/AutoUpdate

on:
  push:
    branches: [ "main" ]

jobs:
  asp-api-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v3

    - name: Установка .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Скачивание приблуд
      run: dotnet restore

    - name: Виновник торжества
      run: dotnet test

  build-api-deploy:
    runs-on: ubuntu-latest
    needs: asp-api-tests

    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v3

    - name: Установка .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Скачивание приблуд
      run: dotnet restore

    - name: Стройка
      run: dotnet build --no-restore

    - name: Стройка полноценная
      run: |
        dotnet publish GMServerWebPanel.API/GMServerWebPanel.API.csproj \
          -c Release \
          -r linux-x64 \
          -o ./publish
    
    - name: Выкладка на VDS
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VDS_HOST }}
        username: ${{ secrets.VDS_USER }}
        key: ${{ secrets.VDS_SSH_KEY }}
        source: "./publish/*"
        target: "/var/www/GmodServerWebPanel"
        strip_components: 1
        overwrite: true
    
    - name: Restart application
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.VDS_HOST }}
        username: ${{ secrets.VDS_USER }}
        key: ${{ secrets.VDS_SSH_KEY }}
        script: |
          # Запускаем приложение
          sudo systemctl restart GmodServerWebPanel
          sudo systemctl restart nginx

  build-react-deploy:
    runs-on: ubuntu-latest
    needs: asp-api-tests

    steps:
    - name: Клонируем репозиторий
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm install
      working-directory: ./GMServerWebPanel.React

    - name: Build React app
      run: npm run build
      working-directory: ./GMServerWebPanel.React

    - name: Выкладка на VDS
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VDS_HOST }}
        username: ${{ secrets.VDS_USER }}
        key: ${{ secrets.VDS_SSH_KEY }}
        source: "./GMServerWebPanel.React/dist/*"
        target: "/var/www/GMServerWebPanel/wwwroot"
        strip_components: 2
        overwrite: true