<!DOCTYPE html>
<html>
<head>
    <title>System Stats</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            background: #111;
            color: #0f0;
        }

        #stats {
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="stats">Loading...</div>

    <script>
        async function loadStats() {
            const res = await fetch('/stats');
            const data = await res.json();

            document.getElementById('stats').innerHTML = `
                CPU: ${data.cpuUsage.toFixed(2)}%<br>
                RAM: ${data.memoryUsage.toFixed(2)}%<br>
                Disk: ${data.diskUsage.toFixed(2)}%
            `;
        }

        setInterval(loadStats, 1000);
        loadStats();
    </script>
</body>
</html>
